<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Kiểm Tra Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Màn hình Chờ -->
    <div class="container" id="start-screen">
        <h1>Bài Kiểm Tra Trực Tuyến</h1>
        
        <label for="subject-select" style="display: block; margin-bottom: 5px; font-weight: bold;">Chọn môn học:</label>
        <select id="subject-select" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; cursor: pointer; background: white;">
            <option value="Toán">Toán</option>
            <option value="Tiếng anh">Tiếng Anh</option>
        </select>

        <p>⏰ Thời gian làm bài: <b>15 phút.</b></p>
        <p>📝 Số lượng: <b>10 câu</b> ngẫu nhiên.</p>
        <input type="text" id="student-name" placeholder="Nhập Họ và Tên của em vào đây..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; box-sizing: border-box;">
        <button id="start-btn" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em;">Bắt Đầu Làm Bài</button>
    </div>

    <!-- Màn hình Làm bài -->
    <div class="container" id="quiz-screen" style="display:none;">
        
        <!-- Bảng trạng thái chuyên nghiệp -->
        <div class="status-bar" style="display: flex; justify-content: space-around; margin-bottom: 20px; background: #eef6ff; padding: 15px; border-radius: 10px; border-bottom: 4px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <div style="text-align: center;">Thời gian còn lại<br><b id="timer-display" style="font-size: 1.2em; color: #d9534f;">15:00</b></div>
            <div style="text-align: center;">Đã đúng<br><b id="count-correct" style="font-size: 1.2em; color: #28a745;">0</b></div>
            <div style="text-align: center;">Đã sai<br><b id="count-wrong" style="font-size: 1.2em; color: #dc3545;">0</b></div>
        </div>
        
        <div id="quiz"></div>
        
        <button id="submit-btn" style="width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 20px;">Nộp bài</button>
    </div>

    <!-- Màn hình Kết quả -->
    <div class="container" id="result-screen" style="display:none;">
        <div id="result"></div>
        <div id="review-section" style="margin: 20px 0; text-align: left; max-height: 400px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9;"></div>
        <button id="restart-btn" style="width: 100%; padding: 15px; background: #ffc107; color: #333; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; font-weight: bold;">Làm lại bài (Ôn câu sai)</button>
    </div>

    <audio id="warning-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script src="script.js?v=2"></script>
</body>
</html>
