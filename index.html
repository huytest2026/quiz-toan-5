<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Kiểm Tra Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="start-screen">
        <h1>Bài Kiểm Tra Trực Tuyến</h1>
        
        <label for="subject-select" style="display: block; margin-bottom: 5px; font-weight: bold;">Chọn môn học:</label>
        <select id="subject-select" onchange="updateTopicList()" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; cursor: pointer; background: white;">
            <option value="">-- Chọn môn --</option>
            <option value="Toán">Toán</option>
            <option value="Tiếng anh">Tiếng Anh</option>
        </select>

        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Chọn chủ đề (có thể chọn nhiều):</label>
        <!-- Nút bấm nổi bật -->
        <div style="margin-bottom: 10px; display: flex; gap: 10px;">
            <button type="button" onclick="toggleTopics(true)" 
                onmouseover="this.style.backgroundColor='#218838'" 
                onmouseout="this.style.backgroundColor='#28a745'"
                style="flex:1; padding: 10px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s;">
                Chọn tất cả
            </button>
            <button type="button" onclick="toggleTopics(false)" 
                onmouseover="this.style.backgroundColor='#c82333'" 
                onmouseout="this.style.backgroundColor='#dc3545'"
                style="flex:1; padding: 10px; cursor: pointer; background: #dc3545; color: white; border: none; border-radius: 5px; font-weight: bold; transition: 0.3s;">
                Bỏ chọn tất cả
            </button>
        </div>
        
        <div id="topic-container" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #fdfdfd; max-height: 150px; overflow-y: auto;">
            <p style="color: #888; font-size: 0.9em;">Hãy chọn môn trước...</p>
        </div>

        <p>⏰ Thời gian làm bài: <b>10 phút.</b></p>
        <p>📝 Số lượng: <b>20 câu</b> ngẫu nhiên.</p>
        <input type="text" id="student-name" placeholder="Nhập Họ và Tên của em vào đây..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; box-sizing: border-box;">
        
        <button id="start-btn" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em;">Bắt Đầu Làm Bài</button>
    </div>

    <!-- Các màn hình khác giữ nguyên như cũ -->
    <div id="quiz-screen" style="display:none;" class="container">...</div>
    <div id="result-screen" style="display:none;" class="container">...</div>

    <script src="script.js?v=2027_FINAL"></script>
</body>
</html>
