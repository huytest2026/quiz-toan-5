<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Kiểm Tra Toán 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="start-screen">
        <h1>Bài Kiểm Tra Toán 5</h1>
        <p>⏰ Thời gian làm bài: <b>15 phút.</b></p>
        <p>📝 Số lượng: <b>10 câu</b> ngẫu nhiên.</p>
        <!-- Ô NHẬP TÊN HỌC SINH -->
        <input type="text" id="student-name" placeholder="Nhập Họ và Tên của em vào đây..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; box-sizing: border-box;">
        <button id="start-btn" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em;">Bắt Đầu Làm Bài</button>
    </div>

    <div class="container" id="quiz-screen" style="display:none;">
        <div id="quiz"></div>
        <button id="submit-btn">Nộp bài</button>
    </div>

    <div class="container" id="result-screen" style="display:none;">
        <div id="result"></div>
        <button id="restart-btn">Làm lại bài (Ôn câu sai)</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
