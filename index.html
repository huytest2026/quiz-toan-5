<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="start-screen">
    <h1>Bài Kiểm Tra Trực Tuyến</h1>
    
    <!-- Nhóm nhập mã -->
    <div id="login-section">
        <input type="text" id="student-code" placeholder="Nhập MÃ HỌC SINH..." style="width: 100%; padding: 15px; margin-bottom: 15px; box-sizing: border-box; border-radius: 10px; border: 1px solid #ccc;">
        <button type="button" id="load-data-btn" style="background: #6f42c1; color: white; margin-bottom: 20px; width: 100%; padding: 12px; border: none; border-radius: 10px; cursor: pointer;">Xác nhận Mã & Tải đề</button>
    </div>

    <label style="font-weight: bold;">Chọn môn học:</label>
    <select id="subject-select" onchange="window.updateTopicList()" style="width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px;">
        <option value="">-- Chọn môn --</option>
        <option value="Toán">Toán</option>
        <option value="Tiếng anh">Tiếng Anh</option>
    </select>

    <div id="topic-container" style="margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 10px; max-height: 150px; overflow-y: auto; background: #fafafa;"></div>

    <button id="start-btn" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 16px;">Bắt Đầu Làm Bài</button>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px;">
        <button onclick="window.reviewWrong()" style="grid-column: span 2; background: #17a2b8; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">Ôn tập câu sai</button>
        <button onclick="window.showWrongStats()" style="grid-column: span 2; background: #fd7e14; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer;">Thống kê lỗi sai</button>
    </div>

    <div class="info-box" id="ranking-container" style="margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; background: #fff;">
        <h3 style="margin-top: 0;">🏆 Bảng Xếp Hạng</h3>
        <!-- ID ranking-content này sẽ được code JS cập nhật -->
        <div id="ranking-content">Nhấn "Bắt đầu làm bài" và nộp bài để xem kết quả...</div>
    </div>
</div>

<div class="container" id="quiz-screen" style="display:none;">
    <div class="status-bar" style="display: flex; justify-content: space-between; margin-bottom: 15px;">
        <div>Thời gian: <span id="timer-display" style="color: red; font-weight: bold;">--:--</span></div>
        <div>Đúng: <span id="count-correct" style="color: green; font-weight: bold;">0</span> | Sai: <span id="count-wrong" style="color: red; font-weight: bold;">0</span></div>
    </div>
    <div id="quiz"></div>
    <button type="button" id="submit-btn" style="width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; margin-top: 20px; cursor: pointer;">Nộp bài</button>
</div>

<script src="script.js" defer></script>
</body>
</html>
