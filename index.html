<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài Kiểm Tra Trực Tuyến</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Màn hình Chờ -->
    <div class="container" id="start-screen">
        <h1>Bài Kiểm Tra Trực Tuyến</h1>
        
        <label for="subject-select" style="display: block; margin-bottom: 5px; font-weight: bold;">Chọn môn học:</label>
        <select id="subject-select" onchange="updateTopicList()" style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; cursor: pointer; background: white;">
            <option value="">-- Chọn môn --</option>
            <option value="Toán">Toán</option>
            <option value="Tiếng anh">Tiếng Anh</option>
        </select>

        <!-- Khu vực hiển thị Checkbox chủ đề -->
        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Chọn chủ đề (có thể chọn nhiều):</label>
        <div id="topic-container" style="margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; border-radius: 5px; background: #fdfdfd; max-height: 150px; overflow-y: auto;">
            <p style="color: #888; font-size: 0.9em;">Hãy chọn môn trước...</p>
        </div>

        <p>⏰ Thời gian làm bài: <b>15 phút.</b></p>
        <p>📝 Số lượng: <b>10 câu</b> ngẫu nhiên.</p>
        <input type="text" id="student-name" placeholder="Nhập Họ và Tên của em vào đây..." style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc; font-size: 1.1em; box-sizing: border-box;">
        
        <button id="start-btn" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em;">Bắt Đầu Làm Bài</button>
        
        <!-- Nút Xem Bảng xếp hạng -->
        <button id="show-rank-btn" style="width: 100%; padding: 15px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 10px;">Xem Bảng Xếp Hạng</button>
    </div>

    <!-- Popup Bảng xếp hạng -->
    <div id="rank-screen" style="display:none; position:fixed; top:10%; left:50%; transform:translateX(-50%); background:white; padding:20px; border-radius:10px; box-shadow:0 0 20px rgba(0,0,0,0.3); z-index:9999; width: 90%; max-width: 400px; text-align:center;">
        <h3>🏆 Top 5 Điểm Cao</h3>
        <div id="rank-list" style="margin: 20px 0; font-size: 1.1em; text-align: left;"></div>
        
        <button onclick="document.getElementById('rank-screen').style.display='none'" style="width:100%; padding: 10px; background:#6c757d; color:white; border:none; border-radius:5px; cursor:pointer;">Đóng</button>
        
        <!-- Nút Reset Bảng xếp hạng -->
        <button onclick="resetRanking()" style="width:100%; padding: 10px; background:#dc3545; color:white; border:none; border-radius:5px; cursor:pointer; margin-top: 10px;">Reset Bảng Xếp Hạng</button>
    </div>

    <!-- Màn hình Làm bài -->
    <div class="container" id="quiz-screen" style="display:none;">
        <div class="status-bar" style="display: flex; justify-content: space-around; margin-bottom: 20px; background: #eef6ff; padding: 15px; border-radius: 10px; border-bottom: 4px solid #3498db; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            <div style="text-align: center;">Thời gian còn lại<br><b id="timer-display" style="font-size: 1.2em; color: #d9534f;">15:00</b></div>
            <div style="text-align: center;">Đã đúng<br><b id="count-correct" style="font-size: 1.2em; color: #28a745;">0</b></div>
            <div style="text-align: center;">Đã sai<br><b id="count-wrong" style="font-size: 1.2em; color: #dc3545;">0</b></div>
        </div>
        
        <div id="quiz"></div>
        
        <button id="submit-btn" style="width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; margin-top: 20px;">Nộp bài</button>
    </div>

    <!-- Màn hình Kết quả -->
    <div class="container" id="result-screen" style="display:none;">
        <div id="result"></div>
        <div id="review-section" style="margin: 20px 0; text-align: left; max-height: 400px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; border-radius: 5px; background: #f9f9f9;"></div>
        <button id="restart-btn" style="width: 100%; padding: 15px; background: #ffc107; color: #333; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1em; font-weight: bold;">Làm lại bài</button>
    </div>

    <script src="script.js?v=6"></script>
</body>
</html>
