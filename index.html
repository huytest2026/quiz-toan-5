<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài Kiểm Tra Trực Tuyến</title>
    <!-- Kết nối với file CSS bạn đã cập nhật -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="start-screen">
    <h1>Bài Kiểm Tra Trực Tuyến</h1>
    
    <input type="text" id="student-code" placeholder="Nhập MÃ HỌC SINH..." style="width: 100%; padding: 15px; margin-bottom: 15px; box-sizing: border-box; border-radius: 10px; border: 1px solid #ccc;">
    
    <button type="button" id="load-data-btn" style="background: #6f42c1; color: white; margin-bottom: 20px;">Xác nhận Mã & Tải đề</button>

    <label style="font-weight: bold;">Chọn môn học:</label>
    <select id="subject-select" onchange="window.updateTopicList()" style="width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px;">
        <option value="">-- Chọn môn --</option>
        <option value="Toán">Toán</option>
        <option value="Tiếng anh">Tiếng Anh</option>
    </select>

    <div id="topic-container" style="margin: 15px 0; padding: 15px; border: 1px solid #ddd; border-radius: 10px; max-height: 150px; overflow-y: auto; background: #fafafa;"></div>

    <button id="start-btn">Bắt Đầu Làm Bài</button>

    <div style="display: flex; gap: 10px;">
        <button onclick="window.showRanking()" style="background: #ffc107; color: #333;">Xem Xếp Hạng</button>
        <button onclick="window.reviewWrong()" style="background: #17a2b8; color: white;">Ôn tập câu sai</button>
    </div>

    <!-- Vùng xám thông báo mới -->
    <div class="info-box">
        Thí sinh đạt huy chương: <span class="medal-text">xếp hạng 1-3 huy chương vàng, bạc, đồng</span>
    </div>
</div>

<div class="container" id="quiz-screen" style="display:none;">
    <div class="status-bar" style="display: flex; justify-content: space-between;">
        <div>Thời gian: <span id="timer-display" style="color: red;">--:--</span></div>
        <div>Đúng: <span id="count-correct" style="color: green;">0</span> | Sai: <span id="count-wrong" style="color: red;">0</span></div>
    </div>
    
    <div id="quiz"></div>
    
    <button type="button" id="submit-btn" onclick="window.submitQuiz()">Nộp bài</button>
</div>

<script src="script.js" defer></script>
</body>
</html>
